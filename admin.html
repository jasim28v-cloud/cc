<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم قالبك - رفع قالب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; }</style>
</head>
<body class="antialiased p-6">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-3xl p-8 shadow-xl">
            <h1 class="text-2xl font-black text-gray-900 mb-6">📤 رفع قالب جديد</h1>
            
            <div id="login-section">
                <label class="block text-sm font-bold mb-2">كلمة المرور</label>
                <input type="password" id="password-input" class="w-full p-3 border rounded-xl mb-4" placeholder="أدخل كلمة المرور">
                <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">دخول</button>
            </div>

            <div id="upload-section" class="hidden">
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">اسم القالب</label>
                    <input type="text" id="template-name" class="w-full p-3 border rounded-xl" placeholder="مثال: قالب متجر فاخر">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">السعر (دولار)</label>
                    <input type="number" id="template-price" class="w-full p-3 border rounded-xl" placeholder="49">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">التصنيف</label>
                    <input type="text" id="template-category" class="w-full p-3 border rounded-xl" placeholder="متجر إلكتروني">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">الشارة</label>
                    <select id="template-badge" class="w-full p-3 border rounded-xl">
                        <option value="">بدون</option>
                        <option value="جديد">جديد</option>
                        <option value="بريميوم">بريميوم</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">وصف</label>
                    <textarea id="template-desc" class="w-full p-3 border rounded-xl" rows="2"></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">صورة القالب</label>
                    <button type="button" onclick="uploadImage()" class="w-full bg-indigo-100 text-indigo-700 p-3 rounded-xl border border-indigo-200">🖼️ اختر صورة</button>
                    <p id="image-status" class="text-xs text-gray-500 mt-2"></p>
                    <input type="hidden" id="uploaded-image-url">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2">رابط ملف القالب (IPFS)</label>
                    <input type="text" id="template-file-url" class="w-full p-3 border rounded-xl" placeholder="https://ipfs.io/ipfs/...">
                    <p class="text-xs text-gray-500 mt-1">ارفعي الملف على PinMe وضعي الرابط هنا</p>
                </div>
                <button onclick="uploadTemplate()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg">🚀 رفع القالب</button>
                <p id="upload-status" class="text-center text-sm mt-4"></p>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        const PASSWORD = "1234";
        let logged = false, imageUrl = '';

        function login() {
            if (document.getElementById('password-input').value === PASSWORD) {
                logged = true;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('upload-section').classList.remove('hidden');
            } else { alert('❌ كلمة مرور خاطئة'); }
        }

        function uploadImage() {
            cloudinary.createUploadWidget({
                cloudName: 'dmdrxi9xl', uploadPreset: 'go_45xx',
                sources: ['local'], multiple: false,
                clientAllowedFormats: ['jpg','jpeg','png','webp']
            }, (err, res) => {
                if (!err && res?.event === "success") {
                    imageUrl = res.info.secure_url;
                    document.getElementById('image-status').textContent = `✅ ${imageUrl.substring(0,50)}...`;
                    document.getElementById('uploaded-image-url').value = imageUrl;
                }
            }).open();
        }

        async function uploadTemplate() {
            if (!logged) return alert('سجلي الدخول أولاً');
            const name = document.getElementById('template-name').value;
            const price = document.getElementById('template-price').value;
            const category = document.getElementById('template-category').value;
            const badge = document.getElementById('template-badge').value;
            const desc = document.getElementById('template-desc').value;
            const fileUrl = document.getElementById('template-file-url').value;
            const status = document.getElementById('upload-status');
            
            if (!name || !price || !category || !imageUrl || !fileUrl) {
                return alert('جميع الحقول + الصورة + الرابط مطلوبة');
            }
            status.textContent = '⏳ جاري الحفظ...';
            try {
                await database.ref('templates').push({
                    name, price, category, badge, description: desc,
                    image: imageUrl, file: fileUrl,
                    createdAt: new Date().toISOString()
                });
                status.textContent = '✅ تم رفع القالب بنجاح!';
                ['template-name','template-price','template-category','template-desc','template-file-url'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('uploaded-image-url').value = imageUrl = '';
                document.getElementById('image-status').textContent = '';
            } catch(e) { status.textContent = '❌ خطأ: ' + e.message; }
        }
    </script>
</body>
</html>
