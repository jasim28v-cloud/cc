<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم قالبك - رفع قالب جديد (Cloudinary)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <!-- Cloudinary Upload Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; }</style>
</head>
<body class="antialiased p-6">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-3xl p-8 shadow-xl border border-gray-100">
            <h1 class="text-2xl font-black text-gray-900 mb-6">📤 رفع قالب جديد (Cloudinary)</h1>
            
            <!-- إدخال كلمة المرور -->
            <div id="login-section">
                <label class="block text-sm font-bold mb-2">كلمة المرور</label>
                <input type="password" id="password-input" class="w-full p-3 border rounded-xl mb-4" placeholder="أدخل كلمة المرور">
                <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">دخول</button>
            </div>

            <!-- نموذج الرفع (مخفي حتى تسجيل الدخول) -->
            <div id="upload-section" class="hidden">
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">اسم القالب</label>
                    <input type="text" id="template-name" class="w-full p-3 border rounded-xl" placeholder="مثال: قالب متجر فاخر">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">السعر (بالدولار)</label>
                    <input type="number" id="template-price" class="w-full p-3 border rounded-xl" placeholder="49">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">التصنيف</label>
                    <input type="text" id="template-category" class="w-full p-3 border rounded-xl" placeholder="متجر إلكتروني">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">الشارة (اختياري)</label>
                    <select id="template-badge" class="w-full p-3 border rounded-xl">
                        <option value="">بدون شارة</option>
                        <option value="جديد">جديد</option>
                        <option value="بريميوم">بريميوم</option>
                        <option value="الأكثر مبيعاً">الأكثر مبيعاً</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">وصف مختصر</label>
                    <textarea id="template-desc" class="w-full p-3 border rounded-xl" rows="2" placeholder="وصف سريع للقالب..."></textarea>
                </div>
                
                <!-- رفع الصورة عبر Cloudinary -->
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">صورة القالب</label>
                    <button type="button" onclick="uploadImage()" class="w-full bg-indigo-100 text-indigo-700 p-3 rounded-xl border border-indigo-200 hover:bg-indigo-200 transition">
                        🖼️ اختر صورة من Cloudinary
                    </button>
                    <p id="image-status" class="text-xs text-gray-500 mt-2"></p>
                    <input type="hidden" id="uploaded-image-url" value="">
                </div>

                <!-- رفع ملف القالب (إلى Firebase Storage) -->
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2">ملف القالب (index.html أو ZIP)</label>
                    <input type="file" id="template-file" accept=".html,.zip" class="w-full p-3 border rounded-xl">
                </div>

                <button onclick="uploadTemplate()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg">🚀 رفع القالب</button>
                <p id="upload-status" class="text-center text-sm mt-4 text-gray-500"></p>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        const CORRECT_PASSWORD = "1234";
        let isLoggedIn = false;
        let uploadedImageUrl = '';

        function login() {
            const pass = document.getElementById('password-input').value;
            if (pass === CORRECT_PASSWORD) {
                isLoggedIn = true;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('upload-section').classList.remove('hidden');
            } else {
                alert('❌ كلمة المرور غير صحيحة!');
            }
        }

        // فتح نافذة Cloudinary لرفع الصورة
        function uploadImage() {
            const widget = cloudinary.createUploadWidget({
                cloudName: 'dmdrxi9xl',
                uploadPreset: 'go_45xx', // تأكدي من اسم الـ upload preset
                sources: ['local', 'url'],
                multiple: false,
                clientAllowedFormats: ['jpg', 'jpeg', 'png', 'webp'],
                maxFileSize: 5000000
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    uploadedImageUrl = result.info.secure_url;
                    document.getElementById('image-status').textContent = `✅ تم رفع الصورة: ${uploadedImageUrl.substring(0, 50)}...`;
                    document.getElementById('uploaded-image-url').value = uploadedImageUrl;
                }
                if (error) {
                    console.error(error);
                    alert('فشل رفع الصورة.');
                }
            });
            widget.open();
        }

        async function uploadTemplate() {
            if (!isLoggedIn) { alert('سجل دخول أولاً!'); return; }

            const name = document.getElementById('template-name').value;
            const price = document.getElementById('template-price').value;
            const category = document.getElementById('template-category').value;
            const badge = document.getElementById('template-badge').value;
            const desc = document.getElementById('template-desc').value;
            const templateFile = document.getElementById('template-file').files[0];
            const imageUrl = document.getElementById('uploaded-image-url').value;
            const status = document.getElementById('upload-status');

            if (!name || !price || !category || !imageUrl || !templateFile) {
                alert('جميع الحقول + الصورة مطلوبة!'); return;
            }

            status.textContent = '⏳ جاري رفع ملف القالب...';
            
            try {
                // رفع ملف القالب إلى Firebase Storage
                const fileRef = storage.ref(`templates_files/${Date.now()}_${templateFile.name}`);
                await fileRef.put(templateFile);
                const fileUrl = await fileRef.getDownloadURL();

                // حفظ البيانات في Realtime Database
                const newTemplateRef = database.ref('templates').push();
                await newTemplateRef.set({
                    name, price, category, badge, description: desc,
                    image: imageUrl, // رابط Cloudinary
                    file: fileUrl,
                    createdAt: new Date().toISOString()
                });

                status.textContent = '✅ تم رفع القالب بنجاح! سيظهر في الموقع فوراً.';
                // تفريغ الحقول
                document.getElementById('template-name').value = '';
                document.getElementById('template-price').value = '';
                document.getElementById('template-category').value = '';
                document.getElementById('template-desc').value = '';
                document.getElementById('template-file').value = '';
                document.getElementById('uploaded-image-url').value = '';
                document.getElementById('image-status').textContent = '';
                uploadedImageUrl = '';
            } catch (error) {
                status.textContent = '❌ حدث خطأ: ' + error.message;
                console.error(error);
            }
        }
    </script>
</body>
</html>
