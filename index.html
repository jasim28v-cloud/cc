<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قالبك - قوالب جاهزة للبيع | USDT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #fff; }
        .template-card { border: 1px solid #e5e7eb; transition: all 0.3s; }
        .template-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); border-color: #2563eb; }
        .btn-primary { background: #2563eb; }
        .btn-primary:hover { background: #1d4ed8; }
        .modal { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="antialiased text-gray-800">

    <nav class="bg-white border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-cubes text-2xl text-blue-600"></i>
                <span class="text-2xl font-black">قالبك<span class="text-blue-600">.</span></span>
            </div>
            <div class="hidden md:flex gap-6 font-medium">
                <a href="#" class="hover:text-blue-600">الرئيسية</a>
                <a href="#templates" class="hover:text-blue-600">القوالب</a>
                <a href="#" id="contact-whatsapp" class="bg-green-500 text-white px-5 py-2 rounded-full text-sm hover:bg-green-600"><i class="fab fa-whatsapp ml-1"></i> واتساب</a>
            </div>
        </div>
    </nav>

    <section class="bg-white border-b py-20 text-center">
        <h1 class="text-4xl md:text-6xl font-black mb-4">قوالب <span class="text-blue-600">جاهزة</span> للانطلاق</h1>
        <p class="text-gray-600 max-w-2xl mx-auto mb-10">اختر قالبك، ادفع بـ USDT، واحصل على ملفاتك فوراً.</p>
        <a href="#templates" class="btn-primary text-white px-8 py-4 rounded-full text-lg font-bold shadow-lg">استعرض القوالب</a>
        <div class="mt-10 flex justify-center gap-3">
            <span class="bg-gray-100 px-4 py-2 rounded-full text-sm"><i class="fab fa-bitcoin text-amber-500 ml-1"></i> USDT</span>
            <span class="bg-gray-100 px-4 py-2 rounded-full text-sm"><i class="fas fa-infinity text-blue-500 ml-1"></i> رابط دائم</span>
        </div>
    </section>

    <section id="templates" class="max-w-7xl mx-auto px-4 py-16">
        <h2 class="text-3xl font-black text-center mb-12">القوالب المتاحة</h2>
        <div id="templates-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-16 text-gray-400"><i class="fas fa-spinner fa-pulse text-2xl mb-3"></i><p>جاري التحميل...</p></div>
        </div>
    </section>

    <div id="payment-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal">
        <div class="bg-white rounded-3xl p-8 max-w-lg w-full mx-4 shadow-2xl">
            <div class="text-center">
                <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl text-amber-600"><i class="fab fa-bitcoin"></i></div>
                <h3 class="text-xl font-black mb-2">الدفع بـ USDT (TRC20)</h3>
                <div class="bg-gray-50 p-4 rounded-xl border mb-4 text-sm">
                    <p class="text-xs text-gray-500">عنوان المحفظة</p>
                    <p class="font-mono font-bold break-all" id="wallet-address">TCzR1GcHwyQ3ZdEyCv8ZGzQkXx7w1zBeCX</p>
                    <button onclick="copyWallet()" class="mt-2 text-blue-600 text-xs"><i class="far fa-copy ml-1"></i> نسخ</button>
                </div>
                <p class="text-gray-700 mb-4">المبلغ: <span id="modal-price" class="text-2xl font-black text-amber-600">$0</span></p>
                <input type="hidden" id="selected-file">
                <button onclick="confirmPayment()" class="w-full btn-primary text-white py-3 rounded-xl font-bold">تم الدفع، تحميل</button>
                <button onclick="closeModal()" class="w-full text-gray-400 text-sm mt-2">إلغاء</button>
            </div>
        </div>
    </div>

    <footer class="bg-gray-50 border-t py-8 text-center text-gray-500 text-sm">© 2026 قالبك. جميع الحقوق محفوظة.</footer>
    <a href="https://wa.me/9647829219448" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-lg hover:bg-green-600 z-50"><i class="fab fa-whatsapp text-2xl"></i></a>

    <script src="js/firebase-config.js"></script>
    <script>
        const WHATSAPP = '9647829219448';
        document.getElementById('contact-whatsapp')?.addEventListener('click', (e) => { e.preventDefault(); window.open(`https://wa.me/${WHATSAPP}`); });
        
        const grid = document.getElementById('templates-grid');
        const modal = document.getElementById('payment-modal');
        const priceSpan = document.getElementById('modal-price');
        const fileInput = document.getElementById('selected-file');
        
        database.ref('templates').on('value', snap => {
            const data = snap.val();
            grid.innerHTML = '';
            if (!data) { grid.innerHTML = '<div class="col-span-full text-center py-16 text-gray-400">لا توجد قوالب.</div>'; return; }
            Object.values(data).forEach(t => {
                const card = document.createElement('div');
                card.className = 'template-card bg-white rounded-2xl shadow-sm overflow-hidden';
                card.innerHTML = `<div class="h-52 bg-gray-100"><img src="${t.image}" alt="${t.name}" class="w-full h-full object-cover"></div>
                <div class="p-6">
                    <div class="flex justify-between items-start mb-2"><h3 class="text-xl font-black">${t.name}</h3>${t.badge?`<span class="text-xs px-3 py-1 rounded-full ${t.badge==='بريميوم'?'bg-amber-100 text-amber-700':'bg-blue-100 text-blue-700'}">${t.badge}</span>`:''}</div>
                    <p class="text-gray-500 text-sm mb-4">${t.category||''}</p>
                    <div class="flex justify-between items-center"><span class="text-2xl font-black text-blue-600">$${t.price}</span></div>
                    <button class="w-full btn-primary text-white py-3 rounded-xl mt-4" onclick="buy('${t.file}', ${t.price})">شراء بـ USDT</button>
                </div>`;
                grid.appendChild(card);
            });
        });
        
        window.buy = (file, price) => { fileInput.value = file; priceSpan.textContent = '$'+price; modal.classList.remove('hidden'); modal.classList.add('flex'); };
        window.copyWallet = () => { navigator.clipboard.writeText(document.getElementById('wallet-address').textContent); alert('✅ تم النسخ'); };
        window.confirmPayment = () => { const f = fileInput.value; if(f) { window.open(f, '_blank'); closeModal(); window.open(`https://wa.me/${WHATSAPP}?text=تم شراء قالب`); } else alert('خطأ'); };
        window.closeModal = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); };
        modal.addEventListener('click', (e) => { if(e.target===modal) closeModal(); });
    </script>
</body>
</html>
